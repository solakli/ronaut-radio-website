<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ronaut Radio — Stream Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808;
      --surface: #111;
      --border: #1d1d1d;
      --text: #d0d0d0;
      --muted: #444;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #60a5fa;
      --purple: #a78bfa;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: #0d0d0d;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 14px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
    .logo span { color: var(--muted); font-weight: 400; }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      border: 1px solid var(--border);
    }
    .status-pill.healthy  { color: var(--green);  border-color: #22c55e44; background: #22c55e11; }
    .status-pill.degraded { color: var(--amber);  border-color: #f59e0b44; background: #f59e0b11; }
    .status-pill.frozen   { color: var(--red);    border-color: #ef444444; background: #ef444411; animation: pulse 1.5s infinite; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .header-right { font-size: 11px; color: var(--muted); }

    /* ── CPU WARNING ── */
    .cpu-warn {
      display: none;
      margin: 20px 28px 0;
      padding: 14px 18px;
      background: #ef444412;
      border: 1px solid #ef444440;
      border-radius: 6px;
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
    }
    .cpu-warn.visible { display: flex; align-items: center; gap: 10px; }
    .cpu-warn strong { color: #ff6b6b; }

    /* ── MAIN ── */
    .main { padding: 24px 28px; }

    /* ── HERO CARDS ── */
    .hero {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 16px;
    }
    .card-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; }
    .card-value { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; letter-spacing: -0.02em; }
    .card-value.green  { color: var(--green); }
    .card-value.amber  { color: var(--amber); }
    .card-value.red    { color: var(--red); }
    .card-value.blue   { color: var(--blue); }
    .card-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .card-sub b { color: #888; }

    /* ── SECTION ── */
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── TIMELINE ── */
    .timeline-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .timeline-bar {
      display: flex; height: 32px; gap: 2px; border-radius: 4px; overflow: hidden;
    }
    .tl-seg { flex: 1; min-width: 2px; cursor: default; transition: filter 0.1s; }
    .tl-seg:hover { filter: brightness(2); }
    .tl-seg.healthy  { background: #22c55e; opacity: 0.5; }
    .tl-seg.degraded { background: var(--amber); opacity: 0.7; }
    .tl-seg.frozen   { background: var(--red); opacity: 1; }
    .timeline-labels {
      display: flex; justify-content: space-between;
      margin-top: 6px; font-size: 10px; color: var(--muted);
    }

    /* ── CHARTS GRID ── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .chart-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chart-label .current-val {
      font-size: 13px; font-weight: 700; letter-spacing: 0; text-transform: none;
      color: #fff;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 16px;
      text-align: center;
    }
    .stat-num { font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

    /* ── TOP SETS ── */
    .sets-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .set-row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .set-row:last-child { border-bottom: none; }
    .set-rank { font-size: 10px; color: var(--muted); width: 20px; text-align: right; flex-shrink: 0; }
    .set-name { flex: 1; font-size: 13px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .set-bar-wrap { width: 120px; flex-shrink: 0; }
    .set-bar-bg { background: #1a1a1a; border-radius: 3px; height: 6px; overflow: hidden; }
    .set-bar { height: 100%; border-radius: 3px; background: var(--blue); transition: width 0.5s; }
    .set-count { font-size: 11px; color: var(--muted); width: 50px; text-align: right; flex-shrink: 0; }
    .set-hours { font-size: 10px; color: #333; width: 45px; text-align: right; flex-shrink: 0; }

    .loading { padding: 80px; text-align: center; color: #333; font-size: 14px; }
    .error { padding: 60px; text-align: center; color: var(--red); }
    .footer { padding: 20px 28px 0; font-size: 11px; color: #2a2a2a; text-align: right; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Ronaut Radio <span>/ Dashboard</span></div>
    <div class="status-pill" id="status-pill">
      <div class="status-dot"></div>
      <span id="status-text">—</span>
    </div>
  </div>
  <div class="header-right" id="last-updated">—</div>
</div>

<div class="cpu-warn" id="cpu-warn">
  <span>⚠</span>
  <span>System CPU at <strong id="cpu-warn-val">—</strong> — server is under heavy load</span>
</div>

<div class="main" id="main"><div class="loading">Loading stream data…</div></div>

<script>
const API = 'https://stream.ronautradio.la/api';
let charts = {};

const toNum = v => parseFloat(v) || 0;
const toInt = v => parseInt(v) || 0;

function fmt(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function fmtHours(h) {
  if (h >= 1000) return Math.round(h).toLocaleString() + 'h';
  if (h >= 100) return Math.round(h) + 'h';
  return h.toFixed(1) + 'h';
}
function colorClass(v, goodBelow, warnBelow) {
  if (v < goodBelow) return 'green';
  if (v < warnBelow) return 'amber';
  return 'red';
}
function speedClass(v) {
  if (v >= 0.97) return 'green';
  if (v >= 0.85) return 'amber';
  return 'red';
}

function makeChart(id, data, labels, color, opts = {}) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (charts[id]) charts[id].destroy();

  const annotations = [];
  if (opts.threshold) {
    annotations.push({
      type: 'line', yMin: opts.threshold, yMax: opts.threshold,
      borderColor: '#ef444455', borderWidth: 1, borderDash: [4, 4],
    });
  }

  charts[id] = new Chart(ctx.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        backgroundColor: color + '14',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index', intersect: false,
          backgroundColor: '#181818',
          borderColor: '#333', borderWidth: 1,
          titleColor: '#666', bodyColor: '#ddd',
          callbacks: {
            label: ctx => (opts.unit ? ctx.parsed.y + opts.unit : ctx.parsed.y)
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#151515' },
          ticks: { color: '#333', maxTicksLimit: 6, font: { size: 10 } }
        },
        y: {
          grid: { color: '#151515' },
          ticks: { color: '#333', font: { size: 10 } },
          min: opts.min ?? 0,
          suggestedMax: opts.suggestedMax,
        }
      }
    }
  });
}

async function load() {
  try {
    const [kpiRaw, kpiSum, playStats] = await Promise.all([
      fetch(API + '/kpi?rows=288').then(r => r.json()),
      fetch(API + '/kpi?summary=1').then(r => r.json()),
      fetch(API + '/play-stats').then(r => r.json()).catch(() => null),
    ]);
    render(kpiRaw, kpiSum, playStats);
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div class="error">Could not load data — ${e.message}</div>`;
  }
}

function render(raw, sum, play) {
  const rows = raw.rows || [];
  const L = rows[rows.length - 1] || {};

  // Header status
  const st = L.status || 'unknown';
  const pill = document.getElementById('status-pill');
  pill.className = 'status-pill ' + st;
  document.getElementById('status-text').textContent = st.toUpperCase();

  // CPU warning
  const curCpu = toNum(L.ffmpeg_cpu_pct);
  if (curCpu > 80) {
    const w = document.getElementById('cpu-warn');
    w.className = 'cpu-warn visible';
    document.getElementById('cpu-warn-val').textContent = curCpu + '%';
  }

  // Arrays
  const labels    = rows.map(r => fmt(r.timestamp));
  const segAges   = rows.map(r => toInt(r.segment_age_s));
  const speeds    = rows.map(r => toNum(r.ffmpeg_speed));
  const cpus      = rows.map(r => toNum(r.ffmpeg_cpu_pct));
  const listeners = rows.map(r => toInt(r.live_listeners));

  const curAge    = toInt(L.segment_age_s);
  const curSpeed  = toNum(L.ffmpeg_speed);
  const curList   = toInt(L.live_listeners);
  const curFreeze = toInt(L.freeze_today);
  const curRstart = toInt(L.restarts_today);
  const curUptMin = toInt(L.ffmpeg_uptime_min);
  const upDays    = Math.floor(curUptMin / 1440);
  const upHrs     = Math.floor((curUptMin % 1440) / 60);
  const upStr     = upDays ? `${upDays}d ${upHrs}h` : `${upHrs}h ${curUptMin % 60}m`;

  // Timeline labels: first and last timestamp
  const firstLabel = rows.length ? fmt(rows[0].timestamp) : '';
  const lastLabel  = rows.length ? fmt(rows[rows.length - 1].timestamp) : '';

  document.getElementById('main').innerHTML = `

    <!-- HERO CARDS -->
    <div class="hero">
      <div class="card">
        <div class="card-label">Stream Uptime</div>
        <div class="card-value ${sum.uptime_pct >= 99 ? 'green' : sum.uptime_pct >= 95 ? 'amber' : 'red'}">${sum.uptime_pct ?? '—'}<span style="font-size:16px;font-weight:400">%</span></div>
        <div class="card-sub"><b>${sum.frozen_snapshots ?? 0}</b> frozen snapshots · 24h</div>
      </div>
      <div class="card">
        <div class="card-label">Segment Age</div>
        <div class="card-value ${colorClass(curAge, 15, 30)}">${curAge}<span style="font-size:16px;font-weight:400">s</span></div>
        <div class="card-sub">avg <b>${sum.avg_segment_age_s ?? '—'}s</b> · max <b>${sum.max_segment_age_s ?? '—'}s</b></div>
      </div>
      <div class="card">
        <div class="card-label">ffmpeg Speed</div>
        <div class="card-value ${speedClass(curSpeed)}">${curSpeed > 0 ? curSpeed.toFixed(2) : '—'}<span style="font-size:14px;font-weight:400">×</span></div>
        <div class="card-sub">min 24h: <b>${sum.min_ffmpeg_speed ?? '—'}×</b> · avg <b>${sum.avg_ffmpeg_speed ?? '—'}×</b></div>
      </div>
      <div class="card">
        <div class="card-label">System CPU</div>
        <div class="card-value ${colorClass(curCpu, 60, 80)}">${curCpu > 0 ? Math.round(curCpu) : '—'}<span style="font-size:16px;font-weight:400">%</span></div>
        <div class="card-sub">${curCpu > 80 ? '⚠ high load' : curCpu > 0 ? 'normal' : '—'}</div>
      </div>
      <div class="card">
        <div class="card-label">Live Listeners</div>
        <div class="card-value blue">${curList}</div>
        <div class="card-sub">peak <b>${sum.peak_listeners ?? 0}</b> · avg <b>${sum.avg_listeners ?? 0}</b></div>
      </div>
      <div class="card">
        <div class="card-label">Freeze Events</div>
        <div class="card-value ${curFreeze === 0 ? 'green' : 'red'}">${curFreeze}</div>
        <div class="card-sub"><b>${curRstart}</b> restarts today</div>
      </div>
      <div class="card">
        <div class="card-label">ffmpeg Uptime</div>
        <div class="card-value" style="font-size:22px">${upStr || '—'}</div>
        <div class="card-sub">${rows.length} snapshots · 5min intervals</div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="section">
      <div class="section-title">24h Status Timeline</div>
      <div class="timeline-wrap">
        <div class="timeline-bar" id="timeline"></div>
        <div class="timeline-labels"><span>${firstLabel}</span><span>12h ago</span><span>${lastLabel}</span></div>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="section">
      <div class="section-title">Stream Health — Last 24 Hours</div>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-label">Segment Age <span style="color:#555">(frozen &gt;30s)</span><span class="current-val">${curAge}s</span></div>
          <canvas id="c-seg" height="130"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-label">ffmpeg Speed <span style="color:#555">(should be ≥1.0×)</span><span class="current-val">${curSpeed.toFixed(3)}×</span></div>
          <canvas id="c-speed" height="130"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-label">System CPU % <span style="color:#555">(danger &gt;80%)</span><span class="current-val">${Math.round(curCpu)}%</span></div>
          <canvas id="c-cpu" height="130"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-label">Live Listeners<span class="current-val">${curList} now</span></div>
          <canvas id="c-listeners" height="130"></canvas>
        </div>
      </div>
    </div>

    <!-- PLAY STATS -->
    ${play ? `
    <div class="section">
      <div class="section-title">All-Time Play Stats</div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num">${fmtHours(play.total_hours)}</div>
          <div class="stat-label">Hours Streamed</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${play.total_plays.toLocaleString()}</div>
          <div class="stat-label">Sets Aired</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${play.top_sets.length > 0 ? play.top_sets[0].play_count : '—'}</div>
          <div class="stat-label">Most Played (times)</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Top Sets</div>
      <div class="sets-card">
        ${play.top_sets.map((s, i) => {
          const maxCount = play.top_sets[0].play_count || 1;
          const pct = Math.round(s.play_count / maxCount * 100);
          const hrs = s.total_play_s > 0 ? (s.total_play_s / 3600).toFixed(1) + 'h' : '';
          return `<div class="set-row">
            <div class="set-rank">#${i + 1}</div>
            <div class="set-name">${s.display_name}</div>
            <div class="set-bar-wrap"><div class="set-bar-bg"><div class="set-bar" style="width:${pct}%"></div></div></div>
            <div class="set-count">${s.play_count}×</div>
            <div class="set-hours">${hrs}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ` : ''}
  `;

  // Build timeline
  const tl = document.getElementById('timeline');
  rows.forEach(r => {
    const b = document.createElement('div');
    b.className = 'tl-seg ' + (r.status || 'unknown');
    b.title = `${fmt(r.timestamp)} · ${r.status} · seg=${r.segment_age_s}s · speed=${r.ffmpeg_speed}x · cpu=${r.ffmpeg_cpu_pct}%`;
    tl.appendChild(b);
  });

  // Build charts
  makeChart('c-seg',       segAges,   labels, '#ef4444', { unit: 's', suggestedMax: 35 });
  makeChart('c-speed',     speeds,    labels, '#22c55e', { unit: '×', min: 0.7, suggestedMax: 1.1 });
  makeChart('c-cpu',       cpus,      labels, '#f59e0b', { unit: '%', suggestedMax: 100 });
  makeChart('c-listeners', listeners, labels, '#60a5fa', { unit: '' });
}

load();
setInterval(load, 5 * 60 * 1000);
</script>

</body>
</html>
