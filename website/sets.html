<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Sets — Ronaut Radio</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <meta content="Ronaut Radio — Sets Archive. All recorded sets from Ronaut Radio, Los Angeles." name="description" />
    <meta content="Ronaut Radio — Sets" property="og:title" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link href="https://fonts.googleapis.com/" rel="preconnect" />
    <link href="https://fonts.gstatic.com/" rel="preconnect" crossorigin="anonymous" />
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js" type="text/javascript"></script>
    <script type="text/javascript">WebFont.load({ google: { families: ["Oswald:200,300,400,500,600,700"] } });</script>
    <style>
        :root {
            --bg-primary: #f4f4f4;
            --bg-secondary: #fff;
            --text-primary: #000;
            --text-secondary: #333;
            --text-muted: #666;
            --border-color: #ddd;
            --card-bg: #fff;
            --card-shadow: rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --text-primary: #fff;
            --text-secondary: #ccc;
            --text-muted: #999;
            --border-color: #444;
            --card-bg: #2a2a2a;
            --card-shadow: rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Oswald, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ─── THEME TOGGLE ─── */
        #theme-toggle-bar {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 10000;
            padding: 8px 12px;
        }
        #btn-theme {
            font-family: Oswald, sans-serif;
            padding: 6px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--text-primary);
        }
        #btn-theme:hover { background: var(--bg-secondary); }
        .theme-icon-light { display: none; }
        .theme-icon-dark { display: inline; }
        [data-theme="dark"] .theme-icon-light { display: inline; }
        [data-theme="dark"] .theme-icon-dark { display: none; }

        /* ─── NAV BAR ─── */
        #top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            padding-right: 160px; /* clear theme toggle */
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
            position: relative;
            z-index: 100;
        }
        .nav-brand {
            font-family: Oswald, sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
        }
        .nav-brand:hover { color: var(--text-primary); }
        .nav-sets {
            font-family: Oswald, sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-primary);
            border-bottom: 2px solid var(--text-primary);
            padding-bottom: 2px;
        }

        /* ─── PAGE HEADER ─── */
        #sets-page-header {
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 0 24px;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        #sets-page-header h1 {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }
        #sets-total-count {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* ─── GENRE FILTER ─── */
        #sets-genre-filter {
            max-width: 1200px;
            margin: 20px auto 0;
            padding: 0 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .genre-btn {
            font-family: Oswald, sans-serif;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 5px 12px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
        }
        .genre-btn:hover, .genre-btn.active {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        /* ─── FEATURED PLAYER ─── */
        #featured-section {
            max-width: 1200px;
            margin: 32px auto 0;
            padding: 0 24px;
        }
        #featured-inner {
            display: flex;
            gap: 32px;
            align-items: flex-start;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 24px;
        }
        #featured-video-wrap {
            flex: 0 0 48%;
            position: relative;
        }
        #featured-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            display: block;
        }
        #featured-meta {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }
        #feat-number {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        #feat-title {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            line-height: 1.2;
        }
        #feat-desc {
            font-size: 14px;
            font-weight: 300;
            color: var(--text-secondary);
            margin: 0;
        }
        #feat-genres {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        #feat-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .feat-btn {
            font-family: Oswald, sans-serif;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 8px 18px;
            cursor: pointer;
            border: 1px solid var(--text-primary);
            background: transparent;
            color: var(--text-primary);
            transition: background 0.15s, color 0.15s;
        }
        .feat-btn:hover {
            background: var(--text-primary);
            color: var(--bg-primary);
        }
        .feat-btn.close-btn {
            border-color: var(--border-color);
            color: var(--text-muted);
        }
        .feat-btn.close-btn:hover {
            border-color: var(--text-primary);
            background: transparent;
            color: var(--text-primary);
        }
        #feat-tracklist {
            margin-top: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .tl-header {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        .tl-item {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.5px;
            padding: 4px 0;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        .tl-item:last-child { border-bottom: none; }
        .tl-time {
            color: var(--text-muted);
            margin-right: 6px;
            font-size: 11px;
        }

        /* ─── SETS GRID ─── */
        #sets-grid {
            max-width: 1200px;
            margin: 32px auto 60px;
            padding: 0 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 28px;
        }

        /* ─── CARD ─── */
        .set-card {
            cursor: pointer;
            text-align: left;
            transition: opacity 0.2s;
        }
        .set-card:hover { opacity: 0.8; }
        .set-card.active .card-thumb-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--text-primary);
            pointer-events: none;
        }
        .card-thumb-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--border-color);
            overflow: hidden;
        }
        .card-thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-num {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            font-family: Oswald, sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 1px;
            padding: 3px 7px;
        }
        .card-playing-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: var(--text-primary);
            color: var(--bg-primary);
            font-family: Oswald, sans-serif;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 3px 8px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .card-desc {
            font-size: 12px;
            font-weight: 300;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .card-genres {
            font-size: 10px;
            font-weight: 300;
            color: var(--text-muted);
            margin-top: 5px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ─── LOADING / ERROR ─── */
        #sets-loading {
            text-align: center;
            padding: 60px 24px;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            #featured-inner { flex-direction: column; }
            #featured-video-wrap { flex: none; width: 100%; }
        }
        @media (max-width: 600px) {
            #top-nav { padding-right: 24px; }
            #sets-page-header h1 { font-size: 24px; }
            #sets-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
        }
        @media (max-width: 400px) {
            #sets-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Theme Toggle -->
    <div id="theme-toggle-bar">
        <button id="btn-theme" title="Toggle dark/light mode">
            <span class="theme-icon-light">&#9728;&#65038; Light</span>
            <span class="theme-icon-dark">&#9790;&#65038; Dark</span>
        </button>
    </div>

    <!-- Nav Bar -->
    <div id="top-nav">
        <a href="index.html" class="nav-brand">Ronaut Radio</a>
        <span class="nav-sets">Sets</span>
    </div>

    <!-- Featured Player (hidden until set selected) -->
    <div id="featured-section" style="display:none">
        <div id="featured-inner">
            <div id="featured-video-wrap">
                <video id="featured-video" controls playsinline></video>
            </div>
            <div id="featured-meta">
                <div id="feat-number"></div>
                <h2 id="feat-title"></h2>
                <p id="feat-desc"></p>
                <div id="feat-genres"></div>
                <div id="feat-actions">
                    <button class="feat-btn" id="feat-copy-btn" onclick="copyLink()">Copy Link</button>
                    <button class="feat-btn close-btn" onclick="closeFeatured()">✕ Close</button>
                </div>
                <div id="feat-tracklist" style="display:none"></div>
            </div>
        </div>
    </div>

    <!-- Page Header -->
    <div id="sets-page-header">
        <h1>Sets</h1>
        <span id="sets-total-count"></span>
    </div>

    <!-- Genre Filter -->
    <div id="sets-genre-filter"></div>

    <!-- Grid -->
    <div id="sets-grid">
        <div id="sets-loading">Loading sets...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        var API = 'https://stream.ronautradio.la';
        var allSets = [];
        var hlsInstance = null;
        var activeSlug = null;
        var activeGenre = 'all';

        // ── Theme ──
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
        }
        (function() {
            var saved = localStorage.getItem('theme') || 'dark';
            applyTheme(saved);
        })();
        document.getElementById('btn-theme').addEventListener('click', function() {
            var cur = document.documentElement.getAttribute('data-theme');
            var next = cur === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        });

        // ── Helpers ──
        function getSlug(set) {
            if (set.url && set.url.indexOf('.m3u8') !== -1) {
                return set.url.split('/').pop().replace('.m3u8', '');
            }
            // fallback normalize
            return (set.filename || '')
                .replace(/\.mp4$/i, '')
                .replace(/^ronaut\[\d+\]-?/i, '')
                .toLowerCase()
                .replace(/[^a-z0-9]/g, '');
        }

        function getNumber(filename) {
            var m = (filename || '').match(/\[(\d+)\]/);
            return m ? m[1] : '';
        }

        function escHtml(s) {
            return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── Load ──
        async function loadSets() {
            try {
                var res = await fetch(API + '/api/sets');
                var data = await res.json();
                allSets = (data.sets || []).sort(function(a, b) {
                    return parseInt(getNumber(b.filename) || '0') - parseInt(getNumber(a.filename) || '0');
                });
                renderFilters();
                renderGrid();
                // Auto-select from URL
                var slug = new URLSearchParams(window.location.search).get('set');
                if (slug) {
                    var found = allSets.find(function(s) { return getSlug(s) === slug; });
                    if (found) selectSet(found, false);
                }
            } catch(e) {
                document.getElementById('sets-grid').innerHTML = '<div id="sets-loading">Failed to load sets.</div>';
            }
        }

        // ── Genre filter ──
        function renderFilters() {
            var genres = ['all'];
            allSets.forEach(function(s) {
                (s.genres || []).forEach(function(g) {
                    if (!genres.includes(g)) genres.push(g);
                });
            });
            document.getElementById('sets-genre-filter').innerHTML = genres.map(function(g) {
                return '<button class="genre-btn' + (g === activeGenre ? ' active' : '') +
                    '" onclick="filterGenre(\'' + escHtml(g) + '\')">' + escHtml(g === 'all' ? 'All' : g) + '</button>';
            }).join('');
        }

        function filterGenre(genre) {
            activeGenre = genre;
            renderFilters();
            renderGrid();
        }

        // ── Grid ──
        function renderGrid() {
            var filtered = activeGenre === 'all' ? allSets : allSets.filter(function(s) {
                return (s.genres || []).includes(activeGenre);
            });
            document.getElementById('sets-total-count').textContent = filtered.length + ' set' + (filtered.length !== 1 ? 's' : '');
            if (filtered.length === 0) {
                document.getElementById('sets-grid').innerHTML = '<div id="sets-loading">No sets in this genre.</div>';
                return;
            }
            document.getElementById('sets-grid').innerHTML = filtered.map(function(set) {
                var slug = getSlug(set);
                var num = getNumber(set.filename);
                var genres = (set.genres || []).join(' · ');
                var isActive = slug === activeSlug;
                var thumbUrl = API + set.thumbnail;
                return '<div class="set-card' + (isActive ? ' active' : '') + '" onclick="selectSetBySlug(\'' + escHtml(slug) + '\')">' +
                    '<div class="card-thumb-wrap">' +
                    '<img src="' + escHtml(thumbUrl) + '" alt="' + escHtml(set.title) + '" loading="lazy" onerror="this.style.visibility=\'hidden\'">' +
                    (num ? '<span class="card-num">' + escHtml(num) + '</span>' : '') +
                    (isActive ? '<span class="card-playing-badge">&#9654; Playing</span>' : '') +
                    '</div>' +
                    '<div class="card-title">' + escHtml(set.title) + '</div>' +
                    (set.description ? '<div class="card-desc">' + escHtml(set.description) + '</div>' : '') +
                    (genres ? '<div class="card-genres">' + escHtml(genres) + '</div>' : '') +
                    '</div>';
            }).join('');
        }

        function selectSetBySlug(slug) {
            var found = allSets.find(function(s) { return getSlug(s) === slug; });
            if (found) selectSet(found, true);
        }

        // ── Select set ──
        function selectSet(set, pushHistory) {
            var slug = getSlug(set);
            activeSlug = slug;

            if (pushHistory) {
                var url = new URL(window.location.href);
                url.searchParams.set('set', slug);
                window.history.pushState({ slug: slug }, '', url.toString());
            }

            // Populate meta
            var num = getNumber(set.filename);
            document.getElementById('feat-number').textContent = num ? 'Set ' + num : '';
            document.getElementById('feat-title').textContent = set.title || '';
            document.getElementById('feat-desc').textContent = set.description || '';
            document.getElementById('feat-genres').textContent = (set.genres || []).join(' · ').toUpperCase();

            // Tracklist
            var tl = (set.tracklist || []).filter(function(t) { return !t.needs_id; });
            var tlEl = document.getElementById('feat-tracklist');
            if (tl.length > 0) {
                tlEl.innerHTML = '<div class="tl-header">Tracklist</div>' +
                    tl.map(function(t, i) {
                        var artist = (t.artists && t.artists.length) ? t.artists.join(', ') + ' — ' : '';
                        var time = t.start_time_formatted ? '<span class="tl-time">' + t.start_time_formatted + '</span>' : '';
                        return '<div class="tl-item">' + (i+1) + '. ' + time + escHtml(artist + (t.title || '')) + '</div>';
                    }).join('');
                tlEl.style.display = '';
            } else {
                tlEl.style.display = 'none';
            }

            // Load HLS player
            loadFeaturedPlayer(set);

            // Show featured section
            document.getElementById('featured-section').style.display = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Refresh grid to update active card
            renderGrid();
        }

        // ── HLS Player ──
        function loadFeaturedPlayer(set) {
            var video = document.getElementById('featured-video');
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            video.src = '';
            video.poster = API + set.thumbnail;

            var fullUrl = API + set.url;
            var isHls = set.url && set.url.indexOf('.m3u8') !== -1;

            if (isHls && Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(fullUrl);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function() {});
                });
                hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hlsInstance.startLoad();
                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hlsInstance.recoverMediaError();
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS (Safari/iOS)
                video.src = fullUrl;
                video.play().catch(function() {});
            } else {
                video.src = fullUrl;
                video.play().catch(function() {});
            }
        }

        // ── Close featured ──
        function closeFeatured() {
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            var video = document.getElementById('featured-video');
            video.pause();
            video.src = '';
            document.getElementById('featured-section').style.display = 'none';
            activeSlug = null;
            var url = new URL(window.location.href);
            url.searchParams.delete('set');
            window.history.pushState({}, '', url.toString());
            renderGrid();
        }

        // ── Copy link ──
        function copyLink() {
            var btn = document.getElementById('feat-copy-btn');
            var url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(function() {
                    btn.textContent = 'Copied!';
                    setTimeout(function() { btn.textContent = 'Copy Link'; }, 2000);
                });
            } else {
                var ta = document.createElement('textarea');
                ta.value = url;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = 'Copied!';
                setTimeout(function() { btn.textContent = 'Copy Link'; }, 2000);
            }
        }

        // ── Browser back/forward ──
        window.addEventListener('popstate', function() {
            var slug = new URLSearchParams(window.location.search).get('set');
            if (slug) {
                var found = allSets.find(function(s) { return getSlug(s) === slug; });
                if (found) selectSet(found, false);
            } else {
                if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                document.getElementById('featured-video').src = '';
                document.getElementById('featured-section').style.display = 'none';
                activeSlug = null;
                renderGrid();
            }
        });

        // ── Init ──
        loadSets();
    </script>
</body>
</html>
